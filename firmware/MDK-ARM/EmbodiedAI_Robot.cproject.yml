project:
  packs:
    - pack: ARM::CMSIS@^6.1.0
    - pack: Keil::STM32G4xx_DFP@^2.2.0
  setups:
    - setup: Options for EmbodiedAI_Robot
      processor:
        fpu: sp
      add-path:
        - ../Core/Inc
        - ../Drivers/STM32G4xx_HAL_Driver/Inc
        - ../Drivers/STM32G4xx_HAL_Driver/Inc/Legacy
        - ../Drivers/CMSIS/Device/ST/STM32G4xx/Include
        - ../Drivers/CMSIS/Include
        - ../Application/Algorithm
        - ../Application/Driver
        - ../Application/Device
        - ../Application/Module
        - ../Application/Module/SO101ARM
        - ../Middlewares/Third_Party/FreeRTOS/Source/include
        - ../Middlewares/Third_Party/FreeRTOS/Source/CMSIS_RTOS_V2
        - ../Middlewares/Third_Party/FreeRTOS/Source/portable/GCC/ARM_CM4F
        - ../Application/Task
      debug: "on"
      define:
        - USE_HAL_DRIVER
        - STM32G474xx
        - __TARGET_FPU_VFP
        - __FPU_PRESENT: 1U
      misc:
        - C:
            - -std=c99
          C-CPP:
            - -fno-rtti
            - -funsigned-char
            - -fshort-enums
            - -fshort-wchar
            - -ffunction-sections
            - -Wno-packed
            - -Wno-missing-variable-declarations
            - -Wno-missing-prototypes
            - -Wno-missing-noreturn
            - -Wno-sign-conversion
            - -Wno-nonportable-include-path
            - -Wno-reserved-id-macro
            - -Wno-unused-macros
            - -Wno-documentation-unknown-command
            - -Wno-documentation
            - -Wno-license-management
            - -Wno-parentheses-equality
          CPP:
            - -xc++
            - -std=c++11
            - -fno-exceptions
          ASM:
            - -masm=auto
          Link:
            - --map
            - --load_addr_map_info
            - --xref
            - --callgraph
            - --symbols
            - --info sizes
            - --info totals
            - --info unused
            - --info veneers
            - --strict
            - --summary_stderr
            - --info summarysizes
  linker:
    - script: stm32g474xx_flash.sct
  groups:
    - group: Application/MDK-ARM
      files:
        - file: startup_stm32g474xx.s
    - group: Application/User/Core
      files:
        - file: ../Core/Src/main.c
        - file: ../Core/Src/gpio.c
        - file: ../Core/Src/app_freertos.c
          misc:
            - CPP:
                - -xc++
        - file: ../Core/Src/adc.c
          misc:
            - CPP:
                - -xc++
        - file: ../Core/Src/dma.c
          misc:
            - CPP:
                - -xc++
        - file: ../Core/Src/hrtim.c
        - file: ../Core/Src/i2c.c
        - file: ../Core/Src/tim.c
        - file: ../Core/Src/usart.c
        - file: ../Core/Src/stm32g4xx_it.c
        - file: ../Core/Src/stm32g4xx_hal_msp.c
        - file: ../Core/Src/stm32g4xx_hal_timebase_tim.c
          misc:
            - CPP:
                - -xc++
    - group: Drivers/STM32G4xx_HAL_Driver
      files:
        - file: ../Drivers/STM32G4xx_HAL_Driver/Src/stm32g4xx_hal_tim.c
        - file: ../Drivers/STM32G4xx_HAL_Driver/Src/stm32g4xx_hal_tim_ex.c
        - file: ../Drivers/STM32G4xx_HAL_Driver/Src/stm32g4xx_hal_adc.c
          misc:
            - CPP:
                - -xc++
        - file: ../Drivers/STM32G4xx_HAL_Driver/Src/stm32g4xx_hal_adc_ex.c
          misc:
            - CPP:
                - -xc++
        - file: ../Drivers/STM32G4xx_HAL_Driver/Src/stm32g4xx_ll_adc.c
          misc:
            - CPP:
                - -xc++
        - file: ../Drivers/STM32G4xx_HAL_Driver/Src/stm32g4xx_hal.c
        - file: ../Drivers/STM32G4xx_HAL_Driver/Src/stm32g4xx_hal_rcc.c
        - file: ../Drivers/STM32G4xx_HAL_Driver/Src/stm32g4xx_hal_rcc_ex.c
        - file: ../Drivers/STM32G4xx_HAL_Driver/Src/stm32g4xx_hal_flash.c
        - file: ../Drivers/STM32G4xx_HAL_Driver/Src/stm32g4xx_hal_flash_ex.c
        - file: ../Drivers/STM32G4xx_HAL_Driver/Src/stm32g4xx_hal_flash_ramfunc.c
